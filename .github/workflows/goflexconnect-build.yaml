name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact for IONOS Deploy Now
        uses: ionos-deploy-now/upload-artifact-action@v2
        with:
          artifact-path: dist
          project: goflexconnect
